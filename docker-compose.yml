services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fcm
      POSTGRES_PASSWORD: fcm
      POSTGRES_DB: fcm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fcm:fcm@db:5432/fcm
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

volumes:
  pgdata:
